<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秘書M ダッシュボード</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }
    header .badge {
      font-size: 11px;
      background: #eef2ff;
      color: #4361ee;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
    }
    header .updated {
      margin-left: auto;
      font-size: 12px;
      color: #94a3b8;
    }

    main {
      padding: 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 12px;
    }
    .card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .icon-calendar { background: #eff6ff; }
    .icon-task     { background: #f0fdf4; }
    .icon-mail     { background: #fefce8; }
    .icon-twin     { background: #fdf4ff; }
    .icon-warning  { background: #fff7ed; }
    .icon-history  { background: #f8fafc; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    .card-body {
      font-size: 13px;
      color: #475569;
      line-height: 1.7;
      flex: 1;
    }
    .card-body pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
    }

    .loading {
      color: #94a3b8;
      font-style: italic;
    }
    .error {
      color: #ef4444;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .task-item:last-child { border-bottom: none; }
    .task-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4361ee;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .task-title { font-weight: 500; color: #1e293b; }
    .task-meta  { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .briefing-item {
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 12px;
    }
    .briefing-item:last-child { border-bottom: none; }
    .briefing-date { color: #94a3b8; font-size: 11px; margin-bottom: 2px; }
    .briefing-text { color: #374151; }

    .event-item {
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 13px;
    }
    .event-item:last-child { border-bottom: none; }

    @media (max-width: 600px) {
      main { padding: 16px; gap: 14px; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>秘書M ダッシュボード</h1>
    <span class="badge">LIVE</span>
    <span class="updated" id="updated-at">読み込み中...</span>
  </header>

  <main>
    <!-- 今日の予定 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-calendar">📅</div>
        <span class="card-title">今日の予定</span>
      </div>
      <div class="card-body" id="card-events">
        <span class="loading">取得中...</span>
      </div>
    </div>

    <!-- タスク一覧 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-task">✅</div>
        <span class="card-title">タスク一覧（未完了）</span>
      </div>
      <div class="card-body" id="card-tasks">
        <span class="loading">取得中...</span>
      </div>
    </div>

    <!-- 未読メール -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-mail">✉️</div>
        <span class="card-title">未読メール</span>
      </div>
      <div class="card-body" id="card-emails">
        <span class="loading">取得中...</span>
      </div>
    </div>

    <!-- デジタルツイン -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-twin">🧠</div>
        <span class="card-title">デジタルツイン</span>
      </div>
      <div class="card-body" id="card-twin">
        <span class="loading">取得中...</span>
      </div>
    </div>

    <!-- 参謀の警告 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-warning">⚠️</div>
        <span class="card-title">参謀の警告</span>
      </div>
      <div class="card-body" id="card-warning">
        <span class="loading">取得中...</span>
      </div>
    </div>

    <!-- ブリーフィング履歴 -->
    <div class="card">
      <div class="card-header">
        <div class="card-icon icon-history">📋</div>
        <span class="card-title">ブリーフィング履歴（直近5件）</span>
      </div>
      <div class="card-body" id="card-briefing">
        <span class="loading">取得中...</span>
      </div>
    </div>
  </main>

  <script>
    async function loadDashboard() {
      let data = null;

      try {
        const res = await fetch("/api/dashboard");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        ["events","tasks","emails","twin","warning","briefing"].forEach(id => {
          document.getElementById(`card-${id}`).innerHTML = '<span class="error">取得失敗</span>';
        });
        return;
      }

      // 今日の予定
      const eventsEl = document.getElementById("card-events");
      try {
        const eventsText = data.events || "";
        if (!eventsText || eventsText.trim() === "") {
          eventsEl.textContent = "今日の予定はありません";
        } else {
          const lines = eventsText.split("\n").filter(l => l.trim());
          eventsEl.innerHTML = lines.map(l =>
            `<div class="event-item">${escHtml(l)}</div>`
          ).join("");
        }
      } catch { eventsEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // タスク一覧
      const tasksEl = document.getElementById("card-tasks");
      try {
        const tasks = data.tasks || [];
        if (tasks.length === 0) {
          tasksEl.textContent = "未完了タスクはありません";
        } else {
          tasksEl.innerHTML = tasks.map(t => `
            <div class="task-item">
              <div class="task-dot"></div>
              <div>
                <div class="task-title">${escHtml(t.title || "（タイトルなし）")}</div>
                <div class="task-meta">${escHtml(t.status || "")} ${t.deadline ? "・締切: " + escHtml(t.deadline.slice(0,10)) : ""}</div>
              </div>
            </div>`).join("");
        }
      } catch { tasksEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // 未読メール
      const emailsEl = document.getElementById("card-emails");
      try {
        const emailText = data.emails || "";
        if (!emailText || emailText.trim() === "") {
          emailsEl.textContent = "未読メールはありません";
        } else {
          emailsEl.innerHTML = `<pre>${escHtml(emailText)}</pre>`;
        }
      } catch { emailsEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // デジタルツイン
      const twinEl = document.getElementById("card-twin");
      try {
        const twinText = data.digital_twin || "";
        twinEl.innerHTML = twinText.trim()
          ? `<pre>${escHtml(twinText)}</pre>`
          : "データなし";
      } catch { twinEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // 参謀の警告（digital_twinのwarning_flagsフィールドまたは専用フィールドを想定）
      const warningEl = document.getElementById("card-warning");
      try {
        const warnings = data.warnings || [];
        if (!warnings || warnings.length === 0) {
          warningEl.textContent = "現在、参謀からの警告はありません";
        } else {
          warningEl.innerHTML = warnings.map(w =>
            `<div class="event-item">⚠️ ${escHtml(w)}</div>`
          ).join("");
        }
      } catch { warningEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // ブリーフィング履歴
      const briefEl = document.getElementById("card-briefing");
      try {
        const history = data.briefing_history || [];
        if (history.length === 0) {
          briefEl.textContent = "履歴はありません";
        } else {
          briefEl.innerHTML = history.map(b => `
            <div class="briefing-item">
              <div class="briefing-date">${escHtml((b.created_at || b.sent_at || "").slice(0,16).replace("T"," "))}</div>
              <div class="briefing-text">${escHtml(b.content || b.message || JSON.stringify(b))}</div>
            </div>`).join("");
        }
      } catch { briefEl.innerHTML = '<span class="error">取得失敗</span>'; }

      // 更新時刻
      document.getElementById("updated-at").textContent =
        "最終更新: " + new Date().toLocaleTimeString("ja-JP");
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }

    loadDashboard();
  </script>
</body>
</html>
